name = "referendum-ja-api"
main = "src/index.ts"
compatibility_date = "2026-05-01"
compatibility_flags = ["nodejs_compat"]

# Disable Cloudflare's default request logging. Logs are minimal and IPs are
# hashed with a daily rotating salt server-side; we do not need CF analytics.
[observability]
enabled = false

# Cron: generate the daily snapshot at 03:00 UTC.
[triggers]
crons = ["0 3 * * *"]

# Custom domain — noalacord.com must be on this Cloudflare account.
[[routes]]
pattern = "api.noalacord.com"
zone_name = "noalacord.com"
custom_domain = true

[[d1_databases]]
binding = "DB"
database_name = "referendum-ja"
database_id = "0ec33409-1f66-4daa-9003-02c71274012c"

# Secrets (set with `wrangler secret put <name>`):
#   IP_HASH_SALT          — 32-byte base64, rotated daily by the cron worker
#   SIGNATURE_TOKEN_HMAC  — 32-byte base64, used to sign autonomous signature tokens
#   SECRET_SALT_B64       — Level-2 sealed salt (only set after the custodian ceremony)
#   ARCHIVE_GITHUB_TOKEN  — fine-grained PAT scoped to the archives repo only

[vars]
PUBLIC_SALT = "petitio-referendum-andorra-2026-v1"
# Andorran ISPs (notably Andorra Telecom) operate CGNAT for residential users,
# so a single public IP can legitimately serve many subscribers. We pick a
# 10-minute window with up to 20 hits, sized for spam control given the PoW
# bound on every submission and the small overall target population.
RATE_LIMIT_WINDOW_SECONDS = "600"
RATE_LIMIT_MAX = "20"
POW_BITS = "18"
